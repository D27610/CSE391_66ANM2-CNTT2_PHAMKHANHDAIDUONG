<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập Flexbox</title>
    <style>
        body { background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .form-container { 
            max-width: 800px; width: 100%; background: white; 
            padding: 30px; border: 1px solid #333; font-family: Arial, sans-serif; 
        }
        h2 { font-size: 18px; color: #444; margin-bottom: 25px; }
        .flex-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .flex-item { flex: 1; padding: 12px; border: 1px solid #ccc; outline: none; }
        .full-width { width: 100%; padding: 12px; border: 1px solid #ccc; outline: none; box-sizing: border-box; }
        textarea { height: 250px; resize: vertical; }
        .footer { justify-content: space-between; align-items: center; }
        .btn-send { background-color: #81d4fa; color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .note { font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Get in touch with us by filling contact form below</h2>
    <form>
        <div class="flex-row">
            <input type="text" placeholder="* Enter your full name" class="flex-item">
            <input type="email" placeholder="* Enter your email address" class="flex-item">
        </div>
        <div class="flex-row">
            <input type="text" placeholder="Enter your subject" class="full-width">
        </div>
        <div class="flex-row">
            <textarea placeholder="* Your message here..." class="full-width"></textarea>
        </div>
        <div class="flex-row footer">
            <button type="submit" class="btn-send">Send message</button>
            <span class="note">* Please fill all required form field, thanks!</span>
        </div>
    </form>
</div>

</body>
</html>
